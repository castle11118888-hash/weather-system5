<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>天氣｜版本B5.2.5</title>
  <style>
    :root{
      --bg:#f4f6fb; --card:#fff; --text:#111827; --muted:#6b7280; --border:#e5e7eb;
      --primary:#0f172a; --accent:#4f46e5; --ok:#16a34a; --warn:#d97706; --info:#2563eb; --danger:#dc2626; --chip:#f3f4f6;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Noto Sans TC,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .app{width:min(95vw,1800px);max-width:none;margin:0 auto;padding:20px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:0 2px 10px rgba(0,0,0,.03)}
    .topbar{display:flex;justify-content:space-between;align-items:center;padding:20px 24px;gap:16px}
    .title{font-size:28px;font-weight:800}
    .sub{font-size:13px;color:var(--muted)}
    .layout{display:grid;grid-template-columns:250px minmax(0,1fr);gap:20px;margin-top:20px;align-items:start}
    .sidebar{padding:16px;position:sticky;top:20px;height:fit-content}
    .content{display:grid;gap:20px;min-width:0}
    .navbtn{width:100%;padding:12px 14px;border-radius:14px;border:none;background:transparent;text-align:left;font-size:14px;font-weight:700;cursor:pointer}
    .navbtn.active{background:var(--primary);color:#fff}
    .navbtn:hover{background:#f3f4f6}.navbtn.active:hover{background:var(--primary)}
    .grid4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px}
    .grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
    .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .stat{padding:18px}.stat .num{font-size:34px;font-weight:900;margin-top:8px}
    .section{padding:18px}.section h2{margin:0 0 14px;font-size:22px}
    .toolbar,.row,.top-actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
    .list{display:grid;gap:12px}
    input,select,textarea,button{font:inherit}
    input,select,textarea{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:14px;background:#fff}
    textarea{min-height:120px;resize:vertical}
    .btn{border:none;border-radius:14px;padding:11px 16px;font-weight:700;cursor:pointer}
    .btn.primary{background:var(--primary);color:#fff}
    .btn.secondary{background:#fff;border:1px solid var(--border)}
    .btn.danger{background:var(--danger);color:#fff}
    .btn.warn{background:#fff7ed;color:#9a3412;border:1px solid #fdba74}
    .chips{display:flex;gap:8px;flex-wrap:wrap}
    .chip{padding:5px 10px;border-radius:999px;background:var(--chip);font-size:12px;font-weight:700}
    .chip.ok{background:#dcfce7;color:#166534}.chip.info{background:#dbeafe;color:#1d4ed8}.chip.warn{background:#fef3c7;color:#92400e}.chip.neutral{background:#e5e7eb;color:#374151}
    .item{padding:16px;border:1px solid var(--border);border-radius:18px;background:#fff}
    .storecard{padding:16px;cursor:pointer;transition:.15s transform,.15s box-shadow}
    .storecard:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(0,0,0,.06)}
    .progress{height:10px;background:#edf2f7;border-radius:999px;overflow:hidden;margin-top:12px}
    .bar{height:100%;background:var(--accent)}
    .muted{color:var(--muted)} .small{font-size:13px}
    .login-wrap{max-width:1100px;margin:36px auto;padding:20px;display:grid;grid-template-columns:1.1fr .9fr;gap:20px}
    .hero{padding:28px}.login{padding:24px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr 140px;gap:10px}
    .warnbox{padding:12px 14px;border-radius:14px;background:#fffbeb;color:#92400e;border:1px solid #fde68a}
    .okbox{padding:12px 14px;border-radius:14px;background:#ecfdf5;color:#166534;border:1px solid #a7f3d0}
    .badge{display:inline-block;background:#eef2ff;color:#4338ca;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:800}
    .empty{padding:26px;text-align:center;border-radius:16px;background:#f8fafc;color:var(--muted)}
    mark{background:#fde68a;padding:0 2px;border-radius:4px}
    .table{width:100%;border-collapse:separate;border-spacing:0}.table th,.table td{padding:12px 10px;border-bottom:1px solid var(--border);text-align:left;font-size:14px;vertical-align:middle}.table th{white-space:nowrap;color:var(--primary);font-weight:800}.table td input,.table td select{min-height:44px}.account-table .col-account{width:17%}.account-table .col-name{width:13%}.account-table .col-email{width:18%}.account-table .col-status{width:8%}.account-table .col-role{width:10%}.account-table .col-store{width:9%}.account-table .col-permission{width:12%}.account-table .col-password{width:7%}.account-table .col-actions{width:8%}.account-actions{display:flex;flex-direction:column;gap:10px;align-items:stretch}.account-actions .btn{width:100%}.permission-chip{display:inline-flex;align-items:center;justify-content:center;min-width:88px;line-height:1.4;text-align:center;white-space:normal}.store-manage-row{display:grid;grid-template-columns:90px minmax(0,1fr) 120px;gap:12px;align-items:center}@media (max-width:980px){.account-table,.account-table thead,.account-table tbody,.account-table th,.account-table td,.account-table tr{display:block}.account-table thead{display:none}.account-table tr{border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:12px;background:#fff}.account-table td{border-bottom:none;padding:8px 0}.account-table td::before{content:attr(data-label);display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:700}.account-actions{flex-direction:row}.store-manage-row{grid-template-columns:1fr}} 
    .w240{width:240px}.w180{width:180px}.w140{width:140px}

    .month-date-panel{display:grid;grid-template-columns:220px minmax(0,1fr);gap:12px;align-items:stretch;width:100%}
    .handover-title-block{display:grid;gap:10px;align-content:center;justify-items:start}
    .month-picker-box{border:1px solid var(--border);border-radius:16px;background:#fff;padding:10px 12px;display:grid;gap:8px;align-items:center}
    .month-picker-main{display:grid;gap:6px;min-width:0}
    .month-picker-box label{font-size:12px;color:var(--muted);font-weight:800}
    .month-picker-box input[type="month"]{border:none;padding:4px 0;border-radius:0;font-size:20px;font-weight:900;color:var(--primary)}
    .today-btn{height:46px;border:1px solid #bfdbfe;border-radius:14px;background:#eff6ff;color:#1d4ed8;font-weight:900;padding:0 14px;cursor:pointer;white-space:nowrap}
    .today-btn:hover{background:#dbeafe;border-color:#93c5fd}
    .month-days-strip{border:1px solid var(--border);border-radius:16px;background:#fff;padding:10px;display:grid;grid-template-columns:repeat(10,minmax(54px,1fr));gap:8px;align-items:center;overflow:visible}
    .month-day-btn{border:1px solid var(--border);background:#fff;border-radius:14px;min-width:0;height:54px;display:grid;place-items:center;gap:2px;cursor:pointer;font-weight:900;color:var(--primary);transition:.15s transform,.15s background,.15s border-color}
    .month-day-btn:hover{transform:translateY(-1px);background:#f8fafc}
    .month-day-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 6px 16px rgba(15,23,42,.18)}
    .month-day-btn .dow{font-size:11px;font-weight:800;opacity:.72}
    @media (max-width:1200px){.month-days-strip{grid-template-columns:repeat(7,minmax(48px,1fr))}}
    @media (max-width:980px){.month-date-panel{grid-template-columns:1fr}.month-days-strip{grid-template-columns:repeat(7,minmax(42px,1fr));padding:8px}.month-day-btn{height:50px}.handover-title-block{grid-template-columns:1fr auto;align-items:center}}
    @media (max-width:560px){.month-days-strip{grid-template-columns:repeat(5,minmax(38px,1fr))}.today-btn{width:100%}.handover-title-block{grid-template-columns:1fr}}
    .loading{padding:40px;text-align:center;color:var(--muted)}
    .modalbg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;padding:16px}
    .modal{max-width:560px;width:100%;background:#fff;border-radius:20px;border:1px solid var(--border);padding:20px;box-shadow:0 10px 30px rgba(0,0,0,.2)}
    .unread-badge{position:absolute;top:10px;right:10px;min-width:22px;height:22px;padding:0 6px;border-radius:999px;background:#dc2626;color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;line-height:1}
    .item.focused-item{border-color:#f59e0b!important;box-shadow:0 0 0 4px rgba(245,158,11,.22),0 12px 28px rgba(15,23,42,.12);animation:focusPulse 1s ease-in-out 3}
    @keyframes focusPulse{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
    .search-hit{width:100%;text-align:left;border:1px solid var(--border);background:#fff;border-radius:16px;padding:12px;cursor:pointer;display:block}
    .search-hit:hover{border-color:#93c5fd;background:#f8fbff;box-shadow:0 8px 18px rgba(37,99,235,.08)}
    .search-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
    .search-actions select{width:auto;min-width:150px}

    .shift-columns{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;align-items:start}
    .shift-column{border:1px solid var(--border);border-radius:20px;background:#f8fafc;min-height:260px;padding:14px;display:grid;gap:12px;align-content:start}
    .shift-column-head{display:flex;justify-content:space-between;align-items:center;gap:10px;position:sticky;top:0;background:#f8fafc;padding-bottom:4px;z-index:1}
    .shift-column-title{font-size:18px;font-weight:900;color:var(--primary)}
    .shift-column-counts{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
    .shift-empty{padding:28px 12px;text-align:center;border-radius:16px;background:#fff;color:var(--muted);border:1px dashed var(--border)}
    .shift-column .item{box-shadow:0 1px 4px rgba(15,23,42,.03)}
    @media (max-width:1200px){.shift-columns{grid-template-columns:1fr}.shift-column{min-height:unset}.shift-column-head{position:static}}

    .date-wrap{position:relative;display:inline-flex;align-items:center;gap:8px;vertical-align:middle}
    .date-wrap input[type="date"]{min-width:180px}
    .date-calendar{position:absolute;top:calc(100% + 8px);right:0;z-index:50;width:280px;background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:0 18px 36px rgba(15,23,42,.16);padding:14px;color:var(--text)}
    .date-calendar.left{left:0;right:auto}
    .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;font-weight:900}
    .cal-nav{border:none;background:#f8fafc;border-radius:10px;width:34px;height:34px;cursor:pointer;font-weight:900;color:var(--primary)}
    .cal-week,.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center}
    .cal-week div{font-size:12px;color:var(--muted);font-weight:800;padding:4px 0}
    .cal-day{border:none;background:#fff;border-radius:10px;min-height:34px;cursor:pointer;font-weight:800;color:var(--text);position:relative}
    .cal-day:hover{background:#f3f4f6}
    .cal-day.other{color:#cbd5e1}
    .cal-day.unfinished{color:#dc2626;border:1px solid rgba(220,38,38,.35);background:#fff5f5}
    .cal-day.selected{background:#1d4ed8!important;color:#fff!important;border-color:#1d4ed8!important;box-shadow:0 0 0 3px rgba(29,78,216,.16)}
    .cal-legend{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-top:10px;font-size:12px;color:var(--muted)}
    .cal-dot-red{display:inline-block;width:9px;height:9px;border-radius:999px;background:#dc2626;margin-right:4px}
    @media (max-width:560px){.date-calendar{left:0;right:auto;width:min(86vw,280px)}}
    .landing{width:min(96vw,1680px);max-width:none;margin:0 auto;padding:18px;display:grid;gap:16px}
    .weather-shell{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(320px,.65fr);gap:16px;align-items:stretch}
    .weather-hero{padding:24px;background:
      linear-gradient(90deg,rgba(7,12,28,.82) 0%,rgba(14,23,54,.60) 42%,rgba(15,23,42,.42) 100%),

    .weather-hero:before,.weather-hero:after{content:"";position:absolute;border-radius:999px;background:rgba(255,255,255,.10)}
    .weather-hero:before{width:220px;height:220px;right:-60px;top:-40px}
    .weather-hero:after{width:160px;height:160px;left:-40px;bottom:-60px}
    .weather-row{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;position:relative;z-index:1}
    .weather-temp{font-size:58px;font-weight:900;line-height:1}
    .weather-city{font-size:30px;font-weight:900;line-height:1.2}
    .weather-desc{font-size:16px;opacity:.92;margin-top:8px}
    .weather-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px;position:relative;z-index:1}
    .weather-mini .mini{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:18px;padding:14px}
    .weather-mini .mini .label{font-size:12px;opacity:.85}
    .weather-mini .mini .value{font-size:22px;font-weight:800;margin-top:8px}
    .portal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .portal-box{padding:18px}
    .portal-box h3{margin:0 0 8px;font-size:18px}
    .login-panel{padding:18px;display:grid;gap:14px;align-content:start}
    .login-panel .head{display:flex;justify-content:space-between;align-items:center;gap:10px}
    .public-grid{display:grid;grid-template-columns:1fr;gap:20px;align-content:start}
    .weather-note{padding:16px;border-radius:18px;background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a8a}
    .weather-summary{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;position:relative;z-index:1}
    .weather-summary-right{text-align:right;position:relative;z-index:1;min-width:140px}
    .weather-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;position:relative;z-index:1}
    .weather-meta .chip{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.16)}
    .weather-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:18px;position:relative;z-index:1}
    .weather-actions .btn{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.18);padding:14px 22px;border-radius:18px;font-size:18px;font-weight:800}
    .weather-actions .btn:hover{background:rgba(255,255,255,.22)}
    .weather-actions{margin-bottom:8px}
    .weather-summary-right{padding-top:2px}
    .weather-day{min-height:156px}
    .weather-day .day-name{font-size:15px}
    .weather-day .day-date{font-size:13px}
    .weather-day .day-temp{font-size:16px}
    .weather-updated{font-size:12px;opacity:.86}
    .weather-week{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;margin-top:18px;position:relative;z-index:1}
    .weather-day{background:rgba(15,23,42,.38);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.24);border-radius:18px;padding:14px 12px;text-align:center;min-height:146px;display:grid;align-content:start;gap:6px}
    .weather-day .day-name{font-size:13px;font-weight:800}
    .weather-day .day-date{font-size:12px;opacity:.82}
    .weather-day .day-icon{font-size:28px;line-height:1.1;margin-top:4px}
    .weather-day .day-rain{font-size:12px;opacity:.92}
    .weather-day .day-temp{font-size:14px;font-weight:800}
    .weather-placeholder{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;margin-top:18px;position:relative;z-index:1}
    .weather-skeleton{height:146px;border-radius:18px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.12)}
    .shortcut-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px;margin-top:14px;position:relative;z-index:1}
    .shortcut-tile{display:grid;place-items:center;min-height:74px;border-radius:18px;background:rgba(15,23,42,.32);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.22);cursor:pointer;transition:.18s transform,.18s background,.18s box-shadow}
    .shortcut-tile:hover{transform:translateY(-2px);background:rgba(255,255,255,.18);box-shadow:0 10px 22px rgba(15,23,42,.12)}
    .shortcut-emoji{font-size:38px;line-height:1}
    .market-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px;margin-top:14px;position:relative;z-index:1}
    .market-card{background:rgba(255,255,255,.96);color:var(--primary);box-shadow:0 12px 28px rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.35);border-radius:20px;padding:18px 10px;display:grid;justify-items:center;align-content:center;min-height:138px;text-align:center}
    .market-icon{font-size:34px;line-height:1;margin-bottom:10px;font-weight:900}
    .market-title{font-size:15px;font-weight:900;line-height:1.2}
    .market-subtitle{font-size:12px;color:#334155;line-height:1.2;margin-top:4px;font-weight:800}
    .weather-shell.secure-home{grid-template-columns:1fr}
    .weather-shell.secure-home .weather-hero{min-height:670px}
    .secure-entry-note{margin-top:14px;font-size:13px;opacity:.88;position:relative;z-index:1}
    .login-back{width:100%;margin-bottom:10px}
    @media (min-width:1400px){
      .app{width:min(98vw,1920px)}
      .landing{width:min(97vw,1760px)}
      .topbar{padding:22px 26px}
      .section{padding:22px}
      .stat{padding:22px}

function selectPhotoFiles(fileList){
  const files = Array.from(fileList || []);
  if(!files.length){ resetPendingPhoto(); render(); return; }
  if(files.length > 5) return alert("一則交接最多可上傳 5 個媒體檔案");
  const invalid = files.find(file => !(String(file.type||"").startsWith("image/") || String(file.type||"").startsWith("video/")));
  if(invalid) return alert("請選擇圖片或影片檔案");
  const oversize = files.find(file => file.size > 20 * 1024 * 1024);
  if(oversize) return alert(`單一媒體檔案請控制在 20MB 以內：${oversize.name || "未命名檔案"}`);
  revokePhotoPreview();
  pendingPhotoFiles = files;
  state.newItemPhotoPreviews = files.map(file => URL.createObjectURL(file));

  render();
}
function removePendingPhoto(index){
  if(index < 0 || index >= pendingPhotoFiles.length) return;
  const previews = Array.isArray(state.newItemPhotoPreviews) ? [...state.newItemPhotoPreviews] : [];
  const targetUrl = previews[index];
  if(targetUrl && String(targetUrl).startsWith("blob:")){
    try{ URL.revokeObjectURL(targetUrl); }catch(e){}
  }
  pendingPhotoFiles.splice(index,1);
  previews.splice(index,1);

function formatResetPasswordError(error){
  const code = String(error?.code || "");
  if(code === "auth/invalid-email") return "Email 格式不正確，請重新確認。";
  if(code === "auth/missing-email") return "請先輸入 Email。";
  if(code === "auth/too-many-requests") return "此功能操作過於頻繁，請稍後再試。";
  if(code === "auth/network-request-failed") return "網路連線異常，請確認網路後再試。";
  if(code === "auth/user-not-found") return "查無此登入帳號，請確認 Email 是否正確。";
  if(code === "auth/unauthorized-continue-uri") return "Firebase 尚未授權目前網域。系統已改用 Firebase 預設重設信流程；若仍看到此訊息，請重新整理後再試。";
  if(code === "auth/invalid-continue-uri") return "重設密碼導向網址設定錯誤。";
  return `寄送失敗：${code || "unknown"}${error?.message ? "｜" + error.message : ""}`;
}

function formatStorageError(error){
  const code = String(error?.code || "");
  const msg = String(error?.message || "");
  if(code.includes("storage/unauthorized")) return "沒有 Storage 寫入權限（storage/unauthorized）";
  if(code.includes("storage/unauthenticated")) return "目前登入狀態無法通過 Storage 驗證（storage/unauthenticated）";
  if(code.includes("storage/object-not-found")) return "檔案路徑不存在（storage/object-not-found）";
  if(code.includes("storage/quota-exceeded")) return "Storage 額度已滿（storage/quota-exceeded）";
  if(code.includes("storage/retry-limit-exceeded")) return "上傳重試次數超過限制（storage/retry-limit-exceeded）";
  if(code.includes("storage/unknown")) return `Storage 未知錯誤（storage/unknown）${msg ? "：" + msg : ""}`;
  return `${code || "unknown"}${msg ? "：" + msg : ""}`;
}

async function uploadHandverPhoto(file){  const ext = (file.name && file.name.includes('.')) ? file.name.split('.').pop().toLowerCase() : 'jpg';
  const safeExt = ext.replace(/[^a-z0-9]/g,'') || 'jpg';
  const path = `handover_photos/${effectiveStore()}/${state.selectedDate}/${Date.now()}_${Math.random().toString(36).slice(2)}.${safeExt}`;

  let lastError = null;  for(const target of storageInstances){
    try{
      const photoRef = storageRef(target.instance, path);
      await uploadBytes(photoRef, file);      const url = await getDownloadURL(photoRef);      return url;
    }catch(error){
      console.error("Storage upload failed:", target.bucket, error);
      lastError = error;
    }
  }

  const fallbackRef = storageRef(storage, path);
  try{
    await uploadBytes(fallbackRef, file);    const url = await getDownloadURL(fallbackRef);    return url;
  }catch(error){
    console.error("Default storage upload failed:", error);
    lastError = error || lastError;
  }

  throw lastError || new Error("storage upload failed");
}
async function uploadHandverPhotos(files){
  const list = Array.from(files || []);
  const uploaded = [];
  for(const file of list){
    const url = await uploadHandverPhoto(file);
    uploaded.push({ url, name:file.name || "照片" });
  }
  return uploaded;
}

  if(!value) return "";

    const list = state.handovers.filter(h => h.date===state.selectedDate && h.storeId===store.id);

    const pendingItems = list.filter(i => i.status==="pending");

    const done = doneItems.length;
    const inProgress = inProgressItems.length;
    const pending = pendingItems.length;
    const followup = followupItems.length;

    return {...store,total,done,inProgress,pending,followup,abnormal,doneUnread,inProgressUnread,pendingUnread,followupUnread,progress: total?Math.round(done/total*100):0};
  });
}

  const announcements = state.announcements.filter(a => {

async function ensureProfile(user, nameFromRegister=""){
  const ref = doc(db,"users",user.uid);
  const snap = await getDoc(ref);
  if(snap.exists()){
    const data = snap.data();
    if(data.pendingApproval){
      await signOut(auth);
      setState({loginError:"此帳號正在等待管理員審核。", profile:null, currentUser:null});
      return;
    }
    if(data.active===false){
      await signOut(auth);
      setState({loginError:"此帳號已被停用，請聯絡管理員。", profile:null, currentUser:null});
      return;
    }
    setState({ profile:{id:user.uid,...data,role:normalizeRole(data.role)} });
    subscribeData();
    return;
  }
  const existing = await getDocs(collection(db,"users"));
  const firstUser = existing.size===0;
  const profile = {
    email:user.email, username:user.email, name:nameFromRegister || user.email.split("@")[0],
    role:firstUser?"admin":"staff", storeId:firstUser?null:"A", active:true, createdAt:serverTimestamp()
  };
  await setDoc(ref, profile);
  setState({ profile:{id:user.uid,...profile}, infoMessage:firstUser?"第一個註冊帳號已設為管理員。":"已註冊成功，預設為員工 寶慶。" });
  subscribeData();
}
function subscribeData(){
  clearSubs();
  unsubscribers.push(onSnapshot(collection(db,"handovers"), snap => setState({handovers:snap.docs.map(d=>({id:d.id,...d.data()}))})));
  unsubscribers.push(onSnapshot(collection(db,"announcements"), snap => {
    const rows = snap.docs.map(d=>({id:d.id,...d.data()}));
    rows.sort((a,b) => String(b.createdAt?.seconds||0).localeCompare(String(a.createdAt?.seconds||0)));
    setState({ announcements:rows, lastAnnouncement:rows[0]||null, showAnnouncementModal:false });
  }));
  unsubscribers.push(onSnapshot(collection(db,"users"), snap => setState({users:snap.docs.map(d=>({id:d.id,...d.data(),role:normalizeRole(d.data().role)}))})));
  unsubscribers.push(onSnapshot(collection(db,"applications"), snap => {
    const rows = snap.docs.map(d=>({id:d.id,...d.data()}));
    rows.sort((a,b) => String(b.createdAt?.seconds||0).localeCompare(String(a.createdAt?.seconds||0)));
    setState({applications:rows});
  }));
  unsubscribers.push(onSnapshot(collection(db,"stores"), async snap => {
    if(snap.empty){
      for(const s of storesSeed){
        await setDoc(doc(db,"stores",s.id), s, {merge:true});
      }
      setState({stores:storesSeed, storeDrafts:Object.fromEntries(storesSeed.map(s=>[s.id,s.name]))});
      return;
    }
    const rows = snap.docs.map(d => ({id:d.id,...d.data(), name: normalizeStoreName(d.id, d.data().name)})).sort((a,b)=>String(a.id).localeCompare(String(b.id)));
    setState({stores:rows, storeDrafts:Object.fromEntries(rows.map(s=>[s.id,normalizeStoreName(s.id, s.name)]))});
  }));
}

async function reviewApplication(uid, status){
  if(!canManageUsers()) return alert("只有管理員或店長可審核申請");
  const appRef = doc(db,"applications",uid);
  const userRef = doc(db,"users",uid);
  const appSnap = await getDoc(appRef);
  const userSnap = await getDoc(userRef);
  if(!appSnap.exists() || !userSnap.exists()) {
    setState({ applications:(state.applications || []).filter(app => app.id !== uid && app.uid !== uid) });
    return;
  }
  const appData = appSnap.data();
  const userData = userSnap.data();
  const payload = {
    status,
    reviewedByUid: currentUid() || null,
    reviewedByName: currentUserName(),
    updatedAt: serverTimestamp()
  };
  await setDoc(appRef, payload, {merge:true});
  const userUpdate = { applicationStatus:status, updatedAt:serverTimestamp() };
  if(status === "approved"){
    userUpdate.active = true;
    userUpdate.pendingApproval = false;
  }else if(status === "rejected"){
    userUpdate.active = false;
    userUpdate.pendingApproval = false;
  }else{
    userUpdate.active = false;
    userUpdate.pendingApproval = true;
  }
  await setDoc(userRef, userUpdate, {merge:true});
  alert(status === "approved" ? `已通過 ${appData.name || userData.name || userData.email} 的申請` : status === "rejected" ? `已標記 ${appData.name || userData.name || userData.email} 為不通過` : `已改為`);
}

  let deletedAny = false;
  try{
    const appRef = doc(db,"applications",uid);

    if(appSnap.exists()){
      await deleteDoc(appRef);
      deletedAny = true;
    }
  }catch(e){ console.warn("delete application doc failed:", e); }
  try{
    const userRef = doc(db,"users",uid);

    if(userSnap.exists()){
      await setDoc(userRef, { pendingApproval:false, applicationStatus:"deleted", active:false, updatedAt:serverTimestamp() }, {merge:true});

  setState({ applications:(state.applications || []).filter(app => String(app.id) !== String(uid) && String(app.uid) !== String(uid)) });
  alert(deletedAny ? "已刪除申請訊息" : "找不到資料庫紀錄，已從畫面移除這筆申請訊息");

async function createAdminManagedUser(){
  if(!canManageUsers()) return alert("只有管理員或店長可建立帳號");
  const email = String(state.adminNewEmail || "").trim();
  const name = String(state.adminNewName || "").trim();
  const role = normalizeRole(state.adminNewRole || "store_supervisor");
  const storeId = String(state.adminNewStore || "A").trim() || "A";
  const active = String(state.adminNewStatus || "true") !== "false";
  if(!email) return setState({adminCreateError:"請輸入 Email", adminCreateMessage:""});
  if(!/^\S+@\S+\.\S+$/.test(email)) return setState({adminCreateError:"Email 格式不正確", adminCreateMessage:""});
  if(!name) return setState({adminCreateError:"請輸入姓名", adminCreateMessage:""});
  if(!["admin","general_manager","store_supervisor"].includes(role)) return setState({adminCreateError:"角色只能選管理員、店長或店主管", adminCreateMessage:""});
  if(!canAssignRole(role)) return setState({adminCreateError:"店長不能建立管理員帳號", adminCreateMessage:""});
  const duplicate = state.users.find(u => !u.removed && String(u.email || u.username || "").toLowerCase() === email.toLowerCase());
  if(duplicate) return setState({adminCreateError:"此 Email 已存在於帳號列表", adminCreateMessage:""});
  if(!confirm(`確定要建立帳號？\n\n姓名：${name}\nEmail：${email}\n角色：${roleLabel(role)}\n\n建立後可立即按「寄重設信」讓對方自行設定密碼。`)) return;
  let secondaryApp = null;
  try{
    setState({adminCreateError:"", adminCreateMessage:"建立中，請稍候..."});
    secondaryApp = initializeApp(firebaseConfig, `adminCreateUser_${Date.now()}_${Math.random().toString(36).slice(2)}`);
    const secondaryAuth = getAuth(secondaryApp);
    secondaryAuth.languageCode = "zh-TW";
    const tempPassword = `Tmp${Math.random().toString(36).slice(2)}${Date.now()}!A1`;
    const cred = await createUserWithEmailAndPassword(secondaryAuth, email, tempPassword);
    const payload = {
      email,
      username: email,
      name,
      role,
      storeId: ["admin","general_manager"].includes(role) ? null : storeId,
      active,
      pendingApproval:false,
      applicationStatus:"approved",
      createdByUid: currentUid() || null,
      createdByName: currentUserName(),
      createdAt: serverTimestamp(),
      updatedAt: serverTimestamp()
    };
    await setDoc(doc(db,"users",cred.user.uid), payload, {merge:true});
    try{ await sendPasswordResetEmail(secondaryAuth, email); }catch(mailErr){ console.warn("create user reset email failed", mailErr); }
    try{ await signOut(secondaryAuth); }catch(_e){}
    await deleteApp(secondaryApp);
    secondaryApp = null;
    setState({
      adminNewEmail:"",adminNewName:"",adminNewRole:"store_supervisor",adminNewStore:"A",adminNewStatus:"true",
      adminCreateError:"",
      adminCreateMessage:`已建立 ${name}，並嘗試寄出密碼重設信。若未收到，也可以在列表按「寄重設信」重寄。`
    });
  }catch(e){
    console.error("create managed user failed:", e);
    let msg = "建立帳號失敗，請稍後再試。";
    const code = String(e?.code || "");
    if(code.includes("auth/email-already-in-use")) msg = "此 Email 已被 Firebase Authentication 使用。";
    else if(code.includes("auth/invalid-email")) msg = "Email 格式不正確。";
    else if(code.includes("permission-denied")) msg = "Firestore 權限不足，請檢查 Firebase 規則。";
    else if(e?.message) msg = e.message;
    setState({adminCreateError:msg, adminCreateMessage:""});
    if(secondaryApp){ try{ await deleteApp(secondaryApp); }catch(_e){} }
  }
}

  const name = String(nameInput?.value || "").trim();
  if(!rawId) return alert("請輸入店家代號");
  if(!/^[A-Z0-9_-]{1,12}$/.test(rawId)) return alert("店家代號限英文大寫、數字、-、_，最多 12 碼");
  if(!name) return alert("請輸入店家名稱");
  if(state.stores.some(s => String(s.id).toUpperCase()===rawId)) return alert("此店家代號已存在");
  await setDoc(doc(db,"stores",rawId),{id:rawId,name,createdAt:serverTimestamp()},{merge:true});
  if(idInput) idInput.value = "";
  if(nameInput) nameInput.value = "";
  alert("店家已新增");
}
async function saveStore(id){
  if(!canManageStores()) return alert("只有管理員或店長可修改店家資料");
  const idInput = document.getElementById(`store_id_${id}`);
  const nameInput = document.getElementById(`store_name_${id}`);
  const newId = String(idInput?.value || "").trim().toUpperCase();
  const newName = String(nameInput?.value || "").trim();
  if(!newId) return alert("請輸入店家代號");
  if(!/^[A-Z0-9_-]{1,12}$/.test(newId)) return alert("店家代號限英文大寫、數字、-、_，最多 12 碼");
  if(!newName) return alert("請輸入店別名稱");
  if(newId !== id && state.stores.some(s => String(s.id).toUpperCase()===newId)) return alert("此店家代號已存在");

  if(newId === id){
    await setDoc(doc(db,"stores",id),{id,name:newName},{merge:true});
    alert("店家資料已更新");
    return;
  }

  if(!confirm(`確定要把店家代號從 ${id} 改成 ${newId} 嗎？
天氣會同步更新交接資料、帳號店別與公告店別。`)) return;

  const oldStore = state.stores.find(s => s.id===id);
  await setDoc(doc(db,"stores",newId), {
    ...(oldStore || {}),
    id:newId,
    name:newName,
    updatedAt:serverTimestamp()
  }, {merge:true});

  const handoverSnap = await getDocs(collection(db,"handovers"));
  for(const row of handoverSnap.docs){
    const data = row.data();
    if(String(data.storeId || "") === id){
      await updateDoc(doc(db,"handovers",row.id), {storeId:newId, updatedAt:serverTimestamp()});
    }
  }

  const userSnap = await getDocs(collection(db,"users"));
  for(const row of userSnap.docs){
    const data = row.data();
    if(String(data.storeId || "") === id){
      await updateDoc(doc(db,"users",row.id), {storeId:newId, updatedAt:serverTimestamp()});
    }
  }

  const announcementSnap = await getDocs(collection(db,"announcements"));
  for(const row of announcementSnap.docs){
    const data = row.data();
    if(String(data.targetStoreId || "") === id){
      await updateDoc(doc(db,"announcements",row.id), {targetStoreId:newId, updatedAt:serverTimestamp()});
    }
  }

  await deleteDoc(doc(db,"stores",id));

  const patch = {selectedStore:newId, historyStore:newId};
  if(state.profile && String(state.profile.storeId || "") === id){
    state.profile.storeId = newId;
  }
  setState(patch);
  alert(`店家代號已由 ${id} 更新為 ${newId}`);
}

function isVideoAttachment(url="", mediaType="", mediaName=""){
  const type = String(mediaType || "").toLowerCase();
  const target = `${url || ""} ${mediaName || ""}`.toLowerCase();
  return type.startsWith("video/") || /\.(mp4|webm|mov|m4v|ogg)(\?|#|$|\s)/i.test(target);
}
function mediaListFromItem(item){
  const urls = Array.isArray(item?.photoUrls) && item.photoUrls.length ? item.photoUrls : (item?.photoUrl ? [item.photoUrl] : []);
  const names = Array.isArray(item?.photoNames) && item.photoNames.length ? item.photoNames : (item?.photoName ? [item.photoName] : []);
  const types = Array.isArray(item?.mediaTypes) && item.mediaTypes.length ? item.mediaTypes : (item?.mediaType ? [item.mediaType] : []);
  return urls.map((url,index) => ({
    url,
    name: names[index] || `交接媒體${index+1}`,
    type: types[index] || ""
  }));
}
function renderMediaAttachments(item, size=120){
  const list = mediaListFromItem(item);

  return `<div style="margin-top:10px"><div class="row" style="gap:10px;flex-wrap:wrap;align-items:flex-start">${list.map((media,index) => {
    const url = escapeHtml(media.url);
    const name = escapeHtml(media.name || `交接媒體${index+1}`);
    if(isVideoAttachment(media.url, media.type, media.name)){
      return `<div style="display:grid;gap:6px"><video src="${url}" controls playsinline preload="metadata" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:16px;border:1px solid var(--border);background:#000"></video><a href="${url}" target="_blank" rel="noopener noreferrer" class="small" style="max-width:${size}px;word-break:break-all">開啟影片</a></div>`;

    return `<a href="${url}" target="_blank" rel="noopener noreferrer" style="display:grid;gap:6px;text-decoration:none;color:inherit"><img src="${url}" alt="${name}" style="width:${size}px;height:${size}px;object-fit:cover;border-radius:16px;border:1px solid var(--border)" onerror="this.style.display='none';this.parentElement.innerHTML='${isVideoAttachment(media.url, media.type, media.name) ? '開啟影片' : '開啟附件'}'"><div class="small muted" style="max-width:${size}px;word-break:break-all">${name}</div></a>`;
  }).join("")}</div></div>`;
}

function monthLabelFromDate(value){
  const d = value ? new Date(value) : new Date();
  if(Number.isNaN(d.getTime())) return "";
  return `${d.getFullYear()}年 ${d.getMonth()+1}月`;
}
function addMonths(value, diff){
  const d = value ? new Date(value) : new Date();
  if(Number.isNaN(d.getTime())) return today();
  d.setMonth(d.getMonth()+diff);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(Math.min(d.getDate(), 28)).padStart(2,"0")}`;
}
function hasUnfinishedOnDate(dateValue, storeId){
  const sid = storeId || effectiveStore();
  return state.handovers.some(h => h.date===dateValue && (!sid || h.storeId===sid) && h.status!=="done");
}
function calendarDateValue(year, month, day){
  return `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}

  if(state.openCalendar !== target) return "";
  const base = value ? new Date(value) : new Date();
  const d = Number.isNaN(base.getTime()) ? new Date() : base;
  const year = d.getFullYear();
  const month = d.getMonth();
  const first = new Date(year, month, 1);
  const start = new Date(first);
  start.setDate(1 - first.getDay());
  const days = [];
  for(let i=0;i<42;i++){
    const cur = new Date(start);
    cur.setDate(start.getDate()+i);
    const val = calendarDateValue(cur.getFullYear(), cur.getMonth(), cur.getDate());
    const isOther = cur.getMonth() !== month;
    const isSelected = val === value;
    const unfinished = hasUnfinishedOnDate(val, target === "historyDate" ? state.historyStore : effectiveStore());
    days.push(`<button type="button" class="cal-day ${isOther?"other":""} ${unfinished?"unfinished":""} ${isSelected?"selected":""}" onclick="selectDateFromCalendar('${target}','${val}')">${cur.getDate()}</button>`);
  }
  return `<div class="date-calendar ${align==='left'?'left':''}">
    <div class="cal-head"><button type="button" class="cal-nav" onclick="moveCalendarMonth('${target}',-1)">‹</button><div>${monthLabelFromDate(value)}</div><button type="button" class="cal-nav" onclick="moveCalendarMonth('${target}',1)">›</button></div>
    <div class="cal-week"><div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div></div>
    <div class="cal-days">${days.join("")}</div>
    <div class="cal-legend"><span><span class="cal-dot-red"></span>有未完成事項</span><button type="button" class="btn secondary" style="padding:6px 10px;border-radius:10px" onclick="selectDateFromCalendar('${target}','${today()}')">今天</button></div>
  </div>`;
}

function ymFromDate(value){
  const v = String(value || today());
  return /^\d{4}-\d{2}/.test(v) ? v.slice(0,7) : today().slice(0,7);
}
function daysInMonthFromYM(ym){
  const [y,m] = String(ym || ymFromDate(today())).split("-").map(Number);
  return new Date(y, m, 0).getDate();
}
function buildDateFromYMDay(ym, day){
  return `${ym}-${String(day).padStart(2,"0")}`;
}
function monthDateSelectorHtml(value){
  const selected = String(value || today());
  const ym = ymFromDate(selected);
  const days = daysInMonthFromYM(ym);
  const week = ["日","一","二","三","四","五","六"];
  const buttons = Array.from({length:days}, (_, idx) => {
    const day = idx + 1;
    const date = buildDateFromYMDay(ym, day);
    const d = new Date(date + "T00:00:00");
    const active = date === selected;
    return `<button type="button" class="month-day-btn ${active ? "active" : ""}" onclick="selectMonthDayFromUI('${date}')"><span>${day}</span></button>`;

  return `<div class="month-date-panel">
    <div class="month-picker-box">

    </div>
    <div class="month-days-strip" aria-label="整月日期快速選擇">${buttons}</div>
  </div>`;
}

function applicationStatusMeta(status){
  if(status === "approved") return {label:"通過", cls:"ok"};
  if(status === "rejected") return {label:"不通過", cls:"warn"};
  return {label:"待審核", cls:"neutral"};
}

function applicationList(){
  const appMap = new Map();
  (state.applications || []).forEach(app => {
    if(app?.id) appMap.set(String(app.id), {id:String(app.id), ...app});
  });
  (state.users || []).forEach(user => {
    const isPending = user?.pendingApproval || user?.applicationStatus === "pending";
    if(!user?.id || user?.removed || !isPending) return;
    if(appMap.has(String(user.id))) return;
    appMap.set(String(user.id), {
      id: String(user.id),
      uid: String(user.id),
      email: user.email || user.username || "",
      name: user.name || "",
      status: user.applicationStatus || "pending",
      createdAt: user.createdAt || user.updatedAt || null,
      updatedAt: user.updatedAt || user.createdAt || null,
      reviewedByName: user.reviewedByName || "",
      fallbackFromUsers: true
    });
  });
  return Array.from(appMap.values()).sort((a,b) => {
    const aSec = Number(a?.updatedAt?.seconds || a?.createdAt?.seconds || 0);
    const bSec = Number(b?.updatedAt?.seconds || b?.createdAt?.seconds || 0);
    return bSec - aSec;
  });
}

<script>
(function(){
  function getEmailFromBlock(el){
    const text = (el && el.textContent) ? el.textContent : "";
    const m = text.match(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/i);
    return m ? m[0].toLowerCase() : "";
  }

  function clearLocalResidue(email){
    try{
      const keys = ["pendingAccountRequests","applications","accountApplications","users"];
      keys.forEach(key=>{
        const raw = localStorage.getItem(key);
        if(!raw) return;
        const val = JSON.parse(raw);
        if(Array.isArray(val)){
          localStorage.setItem(key, JSON.stringify(val.filter(x=>{
            const xEmail = String(x.email || x.account || "").toLowerCase();
            const status = String(x.status || x.applicationStatus || "");
            return !(xEmail === email && (status.includes("待") || status === "" || status.includes("審核")));
          })));
        }
      });
    }catch(e){}
  }

  function removeVisibleResidue(email){
    if(!email) return;
    document.querySelectorAll(".item,.card,tr").forEach(el=>{
      const text = (el.textContent || "").toLowerCase();
      if(text.includes(email) && (text.includes("待審核") || text.includes("通過") || text.includes("不通過"))){
        const block = el.closest(".item") || el;
        if(block && block.parentElement) block.remove();
      }
    });
  }

  document.addEventListener("click", function(e){
    const btn = e.target.closest("button");
    if(!btn) return;
    const label = (btn.textContent || "").trim();
    if(label !== "通過" && label !== "不通過") return;

    const block = btn.closest(".item,.card,tr") || btn.parentElement;
    const email = getEmailFromBlock(block);
    setTimeout(()=>{
      clearLocalResidue(email);
      removeVisibleResidue(email);
      location.reload();
    }, 900);
  }, true);
})();
</script>

      if(text.includes('建立帳號') && text.includes('帳號列表')){
        return;
      }
      if(text.includes('建立帳號') && (text.includes('管理員') || text.includes('重設信') || text.includes('姓名') || text.includes('Email'))){
        var box=el.closest('.section,.card') || el;
        box.style.display='none';
      }
    });
  }
  document.addEventListener('DOMContentLoaded', hideAdminCreateAccount);
  setTimeout(hideAdminCreateAccount, 300);
  setTimeout(hideAdminCreateAccount, 1000);
})();
</script>

</body>
</html>
